---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/source.toolkit.fluxcd.io/ocirepository_v1beta2.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: csi-driver-nfs
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  url: oci://ghcr.io/home-operations/charts-mirror/csi-driver-nfs
  ref:
    tag: 4.13.2
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: csi-driver-nfs
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: csi-driver-nfs
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controller:
      replicas: 1
    storageClass:
      create: true
      name: nfs-slow
      parameters:
        server: nas.g-eye.tech
        share: /volume1/CLOUDNATIVE1
      mountOptions:
        - nfsvers=4.1
        - nconnect=16
        - hard
        - noatime
      reclaimPolicy: Delete
      volumeBindingMode: Immediate
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: csi-nfs-controller
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: csi-nfs-controller
              spec:
                template:
                  spec:
                    containers:
                      - name: csi-provisioner
                        args:
                          - "-v=2"
                          - "--csi-address=$(ADDRESS)"
                          - "--leader-election"
                          - "--leader-election-namespace=kube-system"
                          - "--extra-create-metadata=true"
                          - "--feature-gates=HonorPVReclaimPolicy=true"
                          - "--timeout=1200s"
                          - "--retry-interval-max=30m"
                          - "--leader-election-lease-duration=60s"
                          - "--leader-election-renew-deadline=30s"
                          - "--leader-election-retry-period=15s"
                      - name: csi-resizer
                        args:
                          - "-v=2"
                          - "--csi-address=$(ADDRESS)"
                          - "--leader-election"
                          - "--leader-election-namespace=kube-system"
                          - "--timeout=1200s"
                          - "--retry-interval-max=30m"
                          - "--leader-election-lease-duration=60s"
                          - "--leader-election-renew-deadline=30s"
                          - "--leader-election-retry-period=15s"
                      - name: csi-snapshotter
                        args:
                          - "-v=2"
                          - "--csi-address=$(ADDRESS)"
                          - "--leader-election"
                          - "--leader-election-namespace=kube-system"
                          - "--leader-election-lease-duration=60s"
                          - "--leader-election-renew-deadline=30s"
                          - "--leader-election-retry-period=15s"
