---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
configMapGenerator:
- name: battery-health
  files:
  - battery-health.json
- name: charge-level
  files:
  - charge-level.json
- name: charges
  files:
  - charges.json
- name: charging-stats
  files:
  - charging-stats.json
- name: charging-tops
  files:
  - charging-tops.json
- name: drive-stats
  files:
  - drive-stats.json
- name: drives
  files:
  - drives.json
- name: drives-tops
  files:
  - drives-tops.json
- name: efficiency
  files:
  - efficiency.json
- name: locations
  files:
  - locations.json
- name: milage
  files:
  - milage.json
- name: overview
  files:
  - overview.json
- name: projected-range
  files:
  - projected-range.json
- name: states
  files:
  - states.json
- name: statistics
  files:
  - statistics.json
- name: timeline
  files:
  - timeline.json
- name: trip
  files:
  - trip.json
- name: updates
  files:
  - updates.json
- name: vampire-drain
  files:
  - vampire-drain.json
- name: visited
  files:
  - visited.json
- name: charging-costs-stats
  files:
  - charging-costs-stats.json
- name: current-charge-view
  files:
  - current-charge-view.json
- name: tire-pressure
  files:
  - tire-pressure.json
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
    grafana_folder: Teslamate
  labels:
    grafana_dashboard: 'true'
