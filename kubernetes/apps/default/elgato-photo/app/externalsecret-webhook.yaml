---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
# NEW: Harbor webhook signing token, mirrored from 1Password item `flux`.
# REQUIRES: add field `HARBOR_WEBHOOK_TOKEN_ELGATO` to 1Password item `flux`
# (use `openssl rand -hex 32` to generate the token, then paste in 1Password
# AND configure in Harbor UI as the webhook auth header).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-webhook-token
  namespace: default
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: harbor-webhook-token-secret
    creationPolicy: Owner
    template:
      data:
        token: "{{ .HARBOR_WEBHOOK_TOKEN_ELGATO }}"
  dataFrom:
    - extract:
        key: flux
