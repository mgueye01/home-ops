---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: elgato-photo
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  # Fetch the Garage S3 keys EXPLICITLY from the elgato-photo item. The
  # cloudnative-pg item (extracted last in dataFrom) carries a colliding
  # AWS_ACCESS_KEY_ID that was overriding these to the Postgres user "postgresql",
  # so Garage rejected every request with "No such key: postgresql".
  data:
    - secretKey: AWS_ACCESS_KEY_ID_EGP
      remoteRef:
        key: elgato-photo
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY_EGP
      remoteRef:
        key: elgato-photo
        property: AWS_SECRET_ACCESS_KEY
  target:
    name: elgato-photo-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # PostgreSQL Init Container
        INIT_POSTGRES_DBNAME: "{{ .INIT_POSTGRES_DBNAME }}"
        INIT_POSTGRES_HOST: "{{ .INIT_POSTGRES_HOST }}"
        INIT_POSTGRES_USER: "{{ .INIT_POSTGRES_USER }}"
        INIT_POSTGRES_PASS: "{{ .INIT_POSTGRES_PASS }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
        # Application Database
        DATABASE_URL: "postgresql://{{ .INIT_POSTGRES_USER }}:{{ .INIT_POSTGRES_PASS }}@{{ .INIT_POSTGRES_HOST }}:5432/{{ .INIT_POSTGRES_DBNAME }}"
        DIRECT_URL: "postgresql://{{ .INIT_POSTGRES_USER }}:{{ .INIT_POSTGRES_PASS }}@{{ .INIT_POSTGRES_HOST }}:5432/{{ .INIT_POSTGRES_DBNAME }}"
        # NextAuth
        NEXTAUTH_SECRET: "{{ .NEXTAUTH_SECRET }}"
        NEXTAUTH_URL: "{{ .NEXTAUTH_URL }}"
        # Client JWT
        CLIENT_JWT_SECRET: "{{ .CLIENT_JWT_SECRET }}"
        # S3/MinIO Storage
        S3_ENDPOINT: "{{ .S3_ENDPOINT }}"
        # From spec.data above (elgato-photo item), immune to the dataFrom collision.
        AWS_ACCESS_KEY_ID: "{{ .AWS_ACCESS_KEY_ID_EGP }}"
        AWS_SECRET_ACCESS_KEY: "{{ .AWS_SECRET_ACCESS_KEY_EGP }}"
        AWS_REGION: "{{ .AWS_REGION }}"
        BUCKET_NAME: "{{ .BUCKET_NAME }}"
        # Email (Resend)
        RESEND_API_KEY: "{{ .RESEND_API_KEY }}"
  dataFrom:
    - extract:
        key: elgato-photo
    - extract:
        key: cloudnative-pg
