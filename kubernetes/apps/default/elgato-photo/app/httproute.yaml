---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: elgato-photo
  annotations:
    # DNS for elgato-photo.fr is managed by the cloudflare-tunnel DNSEndpoint
    # (apex CNAME to the tunnel); keep external-dns from flattening it to an A.
    external-dns.alpha.kubernetes.io/controller: none
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  hostnames:
    - elgato-photo.fr
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: elgato-photo
          port: 3000
