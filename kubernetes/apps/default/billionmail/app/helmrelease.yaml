---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app billionmail
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      # ── Core + Webmail (share PHP-FPM socket) ──────────────────────
      billionmail:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.3@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
            envFrom: &envFrom
              - secretRef:
                  name: billionmail-secret
          init-conf:
            image:
              repository: busybox
              tag: latest
            command:
              - sh
              - -c
              - |
                mkdir -p /conf/askai
                mkdir -p /conf/postfix/conf
                mkdir -p /conf/postfix/sql
                mkdir -p /conf/rspamd/local.d
                mkdir -p /conf/dovecot/conf.d
        containers:
          pg-sock-proxy:
            image:
              repository: alpine/socat
              tag: "1.8.0.3"
            args:
              - "UNIX-LISTEN:/pg-sock/.s.PGSQL.5432,fork,reuseaddr"
              - "TCP:postgres16-rw.databases.svc.cluster.local:5432"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 10m
                memory: 16Mi
              limits:
                memory: 32Mi
          redis-proxy:
            image:
              repository: alpine/socat
              tag: "1.8.0.3"
            args:
              - "TCP-LISTEN:26379,fork,reuseaddr"
              - "TCP:redis-master.databases.svc.cluster.local:6379"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 10m
                memory: 16Mi
              limits:
                memory: 32Mi
          smtp-proxy:
            image:
              repository: alpine/socat
              tag: "1.8.0.3"
            args:
              - "TCP-LISTEN:25,fork,reuseaddr"
              - "TCP:billionmail-postfix.default.svc.cluster.local:25"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
                add: ["NET_BIND_SERVICE"]
            resources:
              requests:
                cpu: 10m
                memory: 16Mi
              limits:
                memory: 32Mi
          core:
            image:
              repository: billionmail/core
              tag: 4.9.1
            env:
              TZ: "Etc/UTC"
              BILLIONMAIL_HOSTNAME: "mail.g-eye.io"
              DBHOST: "postgres16-rw.databases.svc.cluster.local"
              DBPORT: "5432"
              REDISHOST: "redis-master.databases.svc.cluster.local"
              REDISPORT: "6379"
              REDISPASS: ""
              HTTP_PORT: "80"
              FAIL2BAN_INIT: "n"
              RETENTION_DAYS: "7"
              ADMIN_USERNAME: "billion"
            envFrom: *envFrom
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: 80
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: 80
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: 80
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
                add: ["NET_BIND_SERVICE"]
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 512Mi
          webmail:
            image:
              repository: roundcube/roundcubemail
              tag: 1.6.14-fpm-alpine
            env:
              TZ: "Etc/UTC"
              ROUNDCUBEMAIL_DB_TYPE: "pgsql"
              ROUNDCUBEMAIL_DB_HOST: "postgres16-rw.databases.svc.cluster.local"
              ROUNDCUBEMAIL_DB_PORT: "5432"
              ROUNDCUBEMAIL_DB_NAME: "$(DBNAME)"
              ROUNDCUBEMAIL_DB_USER: "$(DBUSER)"
              ROUNDCUBEMAIL_DB_PASSWORD: "$(DBPASS)"
              ROUNDCUBEMAIL_DEFAULT_HOST: "billionmail-dovecot"
              ROUNDCUBEMAIL_DEFAULT_PORT: "143"
              ROUNDCUBEMAIL_SMTP_SERVER: "billionmail-postfix"
              ROUNDCUBEMAIL_SMTP_PORT: "25"
              ROUNDCUBEMAIL_REQUEST_PATH: "/roundcube"
            envFrom: *envFrom
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
                add: ["SETGID", "SETUID"]
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 256Mi

      # ── Postfix (SMTP) ────────────────────────────────────────────
      postfix:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-postfix-dirs:
            image:
              repository: billionmail/postfix
              tag: "1.6"
            envFrom: *envFrom
            env:
              DBHOST: "postgres16-rw.databases.svc.cluster.local"
            command:
              - sh
              - -c
              - |
                # Create and fix permissions for postfix spool directories
                mkdir -p /var/spool/postfix/{public,maildrop,pid,dev,defer,deferred,active,incoming,corrupt,bounce,hold,flush,saved,trace,private}
                chown root:root /var/spool/postfix
                chown -R postfix:root /var/spool/postfix/active /var/spool/postfix/bounce /var/spool/postfix/corrupt /var/spool/postfix/defer /var/spool/postfix/deferred /var/spool/postfix/flush /var/spool/postfix/hold /var/spool/postfix/incoming /var/spool/postfix/pid /var/spool/postfix/saved /var/spool/postfix/trace /var/spool/postfix/private
                chown postfix:postdrop /var/spool/postfix/public
                chown postfix:postdrop /var/spool/postfix/maildrop
                chmod 730 /var/spool/postfix/public /var/spool/postfix/maildrop
                chmod 700 /var/spool/postfix/private
                chmod 755 /var/spool/postfix
                # Create writable dirs for configs and logs
                mkdir -p /etc/postfix/sql /etc/postfix/conf /var/log/mail
                chmod 755 /etc/postfix/sql /etc/postfix/conf
                # Copy DNS resolver files into chroot for pgsql lookups
                mkdir -p /var/spool/postfix/etc
                cp /etc/resolv.conf /var/spool/postfix/etc/
                cp /etc/nsswitch.conf /var/spool/postfix/etc/
                cp /etc/hosts /var/spool/postfix/etc/
                cp /etc/services /var/spool/postfix/etc/
                # Create Mailgun SASL credentials and relay maps
                cat > /etc/postfix/conf/sasl_passwd <<SASL
                [smtp.eu.mailgun.org]:587 noreply@lelabodamad.fr:$MAILGUN_SMTP_PASSWORD
                SASL
                sed -i 's/^                //' /etc/postfix/conf/sasl_passwd
                # Empty primary maps (per-domain relay resolved via SQL)
                touch /etc/postfix/conf/sender_relay_maps_primary
                touch /etc/postfix/conf/sasl_passwd_primary
                # Header checks to sanitize headers
                cat > /etc/postfix/conf/header_checks <<'HDR'
                if /^\s*Received:.*Authenticated sender.*\(PostBillionMail\)/
                /^Received: from .*? \([\w\-.]* \[.*?\]\)(.*|\n.*)\(Authenticated sender: (.+)\)\s+by.+\(PostBillionMail\) with (.*)/
                  REPLACE Received: from [127.0.0.1] (localhost [127.0.0.1]) by localhost (Mailerdaemon) with $3
                endif
                /^\s*X-Enigmail/        IGNORE
                /^\s*X-Originating-IP/  IGNORE
                /^\s*X-Forward/         IGNORE
                HDR
                sed -i 's/^                //' /etc/postfix/conf/header_checks
                # Generate postmap hash databases
                postmap /etc/postfix/conf/sasl_passwd
                postmap /etc/postfix/conf/sasl_passwd_primary
                postmap /etc/postfix/conf/sender_relay_maps_primary
                chmod 600 /etc/postfix/conf/sasl_passwd /etc/postfix/conf/sasl_passwd.db
                # Create relay SQL lookup files (normally generated by core)
                cat > /etc/postfix/sql/pgsql_sender_relay_maps.cf <<SQLRELAY
                user = $DBUSER
                password = $DBPASS
                hosts = $DBHOST
                dbname = $DBNAME
                query = SELECT CONCAT('[', rc.relay_host, ']:', rc.relay_port) FROM bm_relay_config rc JOIN bm_relay_domain_mapping rdm ON rc.id = rdm.relay_id WHERE rdm.sender_domain = REPLACE('%s', '@', '') AND rc.active = 1 LIMIT 1
                SQLRELAY
                sed -i 's/^                //' /etc/postfix/sql/pgsql_sender_relay_maps.cf
                # Extra config: pod network relay + outbound SASL + relay maps
                cat > /etc/postfix/conf/extra.cf <<'EXTRA'
                mynetworks = 127.0.0.0/8 [::ffff:127.0.0.0]/104 [::1]/128 10.42.0.0/16 10.43.0.0/16
                smtp_sasl_auth_enable = yes
                smtp_sasl_security_options = noanonymous
                smtp_tls_security_level = may
                sender_dependent_relayhost_maps = hash:/etc/postfix/conf/sender_relay_maps_primary, pgsql:/etc/postfix/sql/pgsql_sender_relay_maps.cf
                smtp_sasl_password_maps = hash:/etc/postfix/conf/sasl_passwd_primary, hash:/etc/postfix/conf/sasl_passwd
                smtpd_sasl_auth_enable = yes
                smtpd_sasl_type = dovecot
                smtpd_sasl_path = inet:billionmail-dovecot.default.svc.cluster.local:12345
                smtpd_sasl_security_options = noanonymous
                smtpd_sasl_local_domain = $myhostname
                header_checks = pcre:/etc/postfix/conf/header_checks
                EXTRA
                sed -i 's/^                //' /etc/postfix/conf/extra.cf
            securityContext:
              runAsUser: 0
        containers:
          pg-sock-proxy:
            image:
              repository: alpine/socat
              tag: "1.8.0.3"
            args:
              - "UNIX-LISTEN:/pg-sock/.s.PGSQL.5432,fork,reuseaddr"
              - "TCP:postgres16-rw.databases.svc.cluster.local:5432"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 10m
                memory: 16Mi
              limits:
                memory: 32Mi
          postfix:
            image:
              repository: billionmail/postfix
              tag: "1.6"
            command:
              - /bin/bash
              - -c
              - |
                # Wrap original entrypoint: fix SQL host after postfix.sh generates files
                # Create a wrapper that patches SQL files then starts supervisord
                cat > /fix-sql-hosts.sh <<'FIXSQL'
                #!/bin/bash
                # Wait for postfix.sh to generate SQL files, then fix host references
                while [ ! -f /etc/postfix/sql/pgsql_virtual_domains_maps.cf ]; do sleep 0.5; done
                sleep 1
                sed -i 's/^hosts = pgsql$/hosts = postgres16-rw.databases.svc.cluster.local/' /etc/postfix/sql/*.cf
                # Reload postfix to pick up fixed SQL configs
                sleep 2
                postfix reload 2>/dev/null || true
                FIXSQL
                chmod +x /fix-sql-hosts.sh
                /fix-sql-hosts.sh &
                exec /usr/bin/supervisord -c /etc/supervisor/supervisord.conf
            env:
              TZ: "Etc/UTC"
              BILLIONMAIL_HOSTNAME: "mail.g-eye.io"
              DBHOST: "postgres16-rw.databases.svc.cluster.local"
              DBPORT: "5432"
              REDISHOST: "redis-master.databases.svc.cluster.local"
              REDISPORT: "6379"
              REDISPASS: ""
              RETENTION_DAYS: "7"
            envFrom: *envFrom
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
                add: ["NET_BIND_SERVICE", "CHOWN", "DAC_OVERRIDE", "FOWNER", "SETGID", "SETUID", "SYS_CHROOT"]
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 512Mi

      # ── Dovecot (IMAP) ────────────────────────────────────────────
      dovecot:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          pg-sock-proxy:
            image:
              repository: alpine/socat
              tag: "1.8.0.3"
            args:
              - "UNIX-LISTEN:/pg-sock/.s.PGSQL.5432,fork,reuseaddr"
              - "TCP:postgres16-rw.databases.svc.cluster.local:5432"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 10m
                memory: 16Mi
              limits:
                memory: 32Mi
          dovecot:
            image:
              repository: billionmail/dovecot
              tag: "1.6"
            command:
              - /dovecot.sh
            args:
              - /bin/sh
              - -c
              - |
                # Add TCP auth listener for cross-pod Postfix SASL
                cat > /etc/dovecot/conf.d/99-auth-tcp.conf <<'EOF'
                service auth {
                  inet_listener {
                    port = 12345
                  }
                }
                EOF
                sed -i 's/^                //' /etc/dovecot/conf.d/99-auth-tcp.conf
                # dovecot.sh writes SQL config to conf.d/ but auth-sql.conf.ext
                # references /etc/dovecot/dovecot-sql.conf.ext (root level).
                # Copy the generated config there and fix the Docker hostname.
                cp /etc/dovecot/conf.d/dovecot-sql.conf.ext /etc/dovecot/dovecot-sql.conf.ext
                sed -i 's/host=pgsql/host=postgres16-rw.databases.svc.cluster.local/' /etc/dovecot/dovecot-sql.conf.ext
                # Enable SQL auth instead of system (PAM) auth
                sed -i 's/!include auth-system.conf.ext/#!include auth-system.conf.ext/' /etc/dovecot/conf.d/10-auth.conf
                echo '!include auth-sql.conf.ext' >> /etc/dovecot/conf.d/10-auth.conf
                exec /usr/bin/supervisord -c /etc/supervisor/supervisord.conf
            env:
              TZ: "Etc/UTC"
              BILLIONMAIL_HOSTNAME: "mail.g-eye.io"
              DBHOST: "postgres16-rw.databases.svc.cluster.local"
              DBPORT: "5432"
              REDISHOST: "redis-master.databases.svc.cluster.local"
              REDISPORT: "6379"
              REDISPASS: ""
              RETENTION_DAYS: "7"
            envFrom: *envFrom
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
                add: ["NET_BIND_SERVICE", "CHOWN", "DAC_OVERRIDE", "FOWNER", "SETGID", "SETUID", "SYS_CHROOT"]
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 512Mi

      # ── Rspamd (spam filter) ──────────────────────────────────────
      rspamd:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          rspamd:
            image:
              repository: billionmail/rspamd
              tag: "1.2"
            env:
              TZ: "Etc/UTC"
              REDISHOST: "redis-master.databases.svc.cluster.local"
              REDISPORT: "6379"
              REDISPASS: ""
              RETENTION_DAYS: "7"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 512Mi

    # ── Services ──────────────────────────────────────────────────────
    service:
      app:
        controller: billionmail
        ports:
          http:
            port: 80
      postfix:
        controller: postfix
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: "192.168.10.75"
          lbipam.cilium.io/sharing-key: billionmail
          external-dns.alpha.kubernetes.io/hostname: "smtp.g-eye.io"
        ports:
          smtp:
            port: 25
            protocol: TCP
          smtps:
            port: 465
            protocol: TCP
          submission:
            port: 587
            protocol: TCP
      dovecot:
        controller: dovecot
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: "192.168.10.75"
          lbipam.cilium.io/sharing-key: billionmail
        ports:
          imap:
            port: 143
            protocol: TCP
          imaps:
            port: 993
            protocol: TCP
          auth:
            port: 12345
            protocol: TCP
      rspamd:
        controller: rspamd
        ports:
          milter:
            port: 11332
            protocol: TCP
          http:
            port: 11334
            protocol: TCP

    # ── HTTPRoute (admin UI) ─────────────────────────────────────────
    route:
      app:
        annotations:
          gatus.home-operations.com/enabled: "true"
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 200"]
            path: /api/health
        hostnames:
          - "mail.g-eye.io"
        parentRefs:
          - name: external
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: 80

    # ── Persistence ──────────────────────────────────────────────────
    persistence:
      # .env file required by core binary
      dotenv:
        type: secret
        name: billionmail-secret
        advancedMounts:
          billionmail:
            core:
              - path: /opt/billionmail/.env
                subPath: dotenv
                readOnly: true

      # VolSync-managed app data (ceph-block RWO)
      data:
        existingClaim: billionmail
        advancedMounts:
          billionmail:
            init-conf:
              - path: /conf
                subPath: conf
            core:
              - path: /opt/billionmail/core/data
              - path: /opt/billionmail/conf
                subPath: conf

      # Mailbox storage (ceph-filesystem RWX)
      vmail:
        existingClaim: billionmail-vmail
        advancedMounts:
          billionmail:
            core:
              - path: /opt/billionmail/vmail-data
          dovecot:
            dovecot:
              - path: /var/vmail

      # Rspamd data / DKIM keys (ceph-filesystem RWX)
      rspamd-data:
        existingClaim: billionmail-rspamd
        advancedMounts:
          billionmail:
            core:
              - path: /opt/billionmail/rspamd-data
          postfix:
            postfix:
              - path: /var/lib/rspamd
          dovecot:
            dovecot:
              - path: /var/lib/rspamd
          rspamd:
            rspamd:
              - path: /var/lib/rspamd

      # TLS certificates (ceph-filesystem RWX)
      ssl:
        existingClaim: billionmail-ssl
        advancedMounts:
          billionmail:
            core:
              - path: /etc/ssl/mail
          postfix:
            postfix:
              - path: /etc/ssl/mail
          dovecot:
            dovecot:
              - path: /etc/ssl/mail

      # PHP-FPM socket (core ↔ webmail)
      php-sock:
        type: emptyDir
        advancedMounts:
          billionmail:
            core:
              - path: /opt/billionmail/php-sock
            webmail:
              - path: /var/run

      # Webmail data (core ↔ webmail)
      webmail-data:
        type: emptyDir
        advancedMounts:
          billionmail:
            core:
              - path: /opt/billionmail/webmail-data
            webmail:
              - path: /var/www/html

      # PostgreSQL Unix socket (socat → TCP proxy)
      pg-sock:
        type: emptyDir
        advancedMounts:
          billionmail:
            pg-sock-proxy:
              - path: /pg-sock
            core:
              - path: /opt/billionmail/postgresql-socket
          postfix:
            pg-sock-proxy:
              - path: /pg-sock
            postfix:
              - path: /var/run/postgresql
          dovecot:
            pg-sock-proxy:
              - path: /pg-sock
            dovecot:
              - path: /var/run/postgresql

      # Postfix spool
      postfix-spool:
        type: emptyDir
        advancedMounts:
          postfix:
            init-postfix-dirs:
              - path: /var/spool/postfix
            postfix:
              - path: /var/spool/postfix

      # Postfix SQL config (generated by postfix.sh at startup)
      postfix-sql:
        type: emptyDir
        advancedMounts:
          postfix:
            init-postfix-dirs:
              - path: /etc/postfix/sql
            postfix:
              - path: /etc/postfix/sql

      # Postfix conf dir (vmail_ssl.map, sasl, header_checks)
      postfix-conf:
        type: emptyDir
        advancedMounts:
          postfix:
            init-postfix-dirs:
              - path: /etc/postfix/conf
            postfix:
              - path: /etc/postfix/conf

      # Postfix mail logs
      postfix-logs:
        type: emptyDir
        advancedMounts:
          postfix:
            init-postfix-dirs:
              - path: /var/log/mail
            postfix:
              - path: /var/log/mail

      # Tmp dirs
      core-tmp:
        type: emptyDir
        advancedMounts:
          billionmail:
            core:
              - path: /tmp
      core-logs:
        type: emptyDir
        advancedMounts:
          billionmail:
            core:
              - path: /opt/billionmail/logs
      # core-conf: now served by persistent 'data' PVC (subPath: conf)
      # so AskAI supplier/project configs survive pod restarts
