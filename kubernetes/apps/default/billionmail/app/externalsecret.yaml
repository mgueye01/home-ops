---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: billionmail
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: billionmail-secret
    template:
      data:
        # Postgres Init
        INIT_POSTGRES_DBNAME: billionmail
        INIT_POSTGRES_HOST: postgres16-rw.databases.svc.cluster.local.
        INIT_POSTGRES_USER: "{{ .BILLIONMAIL_POSTGRES_USER }}"
        INIT_POSTGRES_PASS: "{{ .BILLIONMAIL_POSTGRES_PASS }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
        # App
        DBNAME: billionmail
        DBUSER: "{{ .BILLIONMAIL_POSTGRES_USER }}"
        DBPASS: "{{ .BILLIONMAIL_POSTGRES_PASS }}"
        ADMIN_PASSWORD: "{{ .ADMIN_PASSWORD }}"
        # .env file for core binary
        dotenv: |
          ADMIN_USERNAME=billion
          ADMIN_PASSWORD={{ .ADMIN_PASSWORD }}
          SafePath=billion
          BILLIONMAIL_HOSTNAME=mail.g-eye.io
          DBNAME=billionmail
          DBUSER={{ .BILLIONMAIL_POSTGRES_USER }}
          DBPASS={{ .BILLIONMAIL_POSTGRES_PASS }}
          REDISPASS=
          SMTP_PORT=25
          SMTPS_PORT=465
          SUBMISSION_PORT=587
          IMAP_PORT=143
          IMAPS_PORT=993
          POP_PORT=110
          POPS_PORT=995
          HTTP_PORT=80
          HTTPS_PORT=443
          TZ=Etc/UTC
          FAIL2BAN_INIT=n
          IP_WHITELIST_ENABLE=false
          RETENTION_DAYS=7
  dataFrom:
    - extract:
        key: billionmail
    - extract:
        key: cloudnative-pg
