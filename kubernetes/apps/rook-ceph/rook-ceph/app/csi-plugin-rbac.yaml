---
# Ceph-CSI plugin ServiceAccounts + RBAC for ceph-csi-operator v1.0.1.
# These were previously provided by the (now-removed) 'ceph-csi-drivers' Helm
# release. Rook v1.20.0 bundles ceph-csi-operator v1.0.1 but does NOT create the
# per-plugin SAs/RBAC, and the operator's manager-role lacks rights to create
# them, so they must be provided statically. SA names (unprefixed) match what the
# operator requests when OperatorConfig.driverSpecDefaults sets no serviceAccountName.
# Source: github.com/ceph/ceph-csi-operator v1.0.1 deploy/all-in-one/install.yaml
# (prefix 'ceph-csi-operator-' stripped, namespace set to rook-ceph).
